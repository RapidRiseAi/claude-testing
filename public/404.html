<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Real 404 status (served by Vercel for any path that isn't a known
         route or static file). noindex so Google drops dead URLs cleanly. -->
    <meta name="robots" content="noindex" />
    <title>Page Not Found | Rapid Rise AI</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-32.png" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #e8ecf5;
        background: radial-gradient(120% 120% at 50% 0%, #131a2b 0%, #0a0e1a 55%, #070a12 100%);
        text-align: center;
      }
      .wrap { max-width: 560px; }
      .eyebrow {
        font-size: 13px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #7c8db5;
        margin: 0 0 14px;
      }
      h1 { font-size: clamp(28px, 6vw, 44px); margin: 0 0 14px; font-weight: 700; }
      p { color: #aeb8d0; line-height: 1.6; margin: 0 0 28px; }
      .actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
      a {
        display: inline-flex;
        align-items: center;
        padding: 11px 20px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      }
      a:hover { transform: translateY(-1px); }
      .primary { background: #3b6ef5; color: #fff; }
      .primary:hover { background: #2f5fe0; }
      .ghost { color: #cdd6ec; border: 1px solid rgba(173, 184, 214, 0.3); }
      .ghost:hover { border-color: rgba(173, 184, 214, 0.6); }
    </style>
  </head>
  <body>
    <main class="wrap">
      <p class="eyebrow">404</p>
      <h1>Page not found</h1>
      <p>The page you are looking for may have moved, or the link may be incorrect. Try one of these instead:</p>
      <div class="actions">
        <a class="primary" href="/">Back to Home</a>
        <a class="ghost" href="/services">View Services</a>
        <a class="ghost" href="/contact">Contact Us</a>
      </div>
    </main>
  </body>
</html>
