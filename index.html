<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/brand/favicon-48.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/brand/favicon-64.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="/brand/favicon-128.png" />
    <link rel="icon" type="image/png" sizes="256x256" href="/brand/favicon-256.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/brand/favicon-180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rapid Rise AI | Custom Software, AI Systems & Business Automation</title>
    <meta name="description" content="Rapid Rise AI builds custom websites, client portals, smart dashboards, AI agents, automations, IoT systems and connected digital ecosystems for businesses in South Africa." />
    <!-- Default canonical (homepage). Per-route pages update this via the
         usePageMeta hook so each URL points at itself. -->
    <link rel="canonical" href="https://www.rapidriseai.com" />
    <meta property="og:title" content="Rapid Rise AI | Custom Software, AI Systems & Business Automation" />
    <meta property="og:description" content="Custom websites, client portals, smart dashboards, AI agents, automations and connected business ecosystems built in South Africa." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.rapidriseai.com" />
    <!-- Social share image. Square logo for now; replace with a 1200×630 card
         when available for the ideal link-preview crop. -->
    <meta property="og:image" content="https://www.rapidriseai.com/brand/logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://www.rapidriseai.com/brand/logo.png" />
    <!-- Privacy: don't leak full referrer URLs to third parties on outbound nav -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- Fonts are self-hosted (bundled via Fontsource in src/main.jsx) so no
         visitor data is sent to the Google Fonts CDN. -->
    <!-- Content Security Policy. Everything loads from our own origin; the only
         exceptions are inline styles (React/framer-motion) and data/blob URIs
         used by the 3D canvas. Set as a meta tag so it applies on any static
         host. NOTE: if you later add analytics or a form webhook, extend
         script-src / connect-src accordingly (and gate it behind consent). -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; media-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self' mailto:"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
